<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Попередження про порушення</title>

    <!-- Підключення шрифтів -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* Базові стилі */
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e0e0e0;
        }

        /* Оверлей з напівпрозорим фоном */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease-in-out;
        }

        /* Основна картка */
        .warning-modal {
            background: #F8F9FA;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* Прогрес бар */
        .progress-container {
            margin-bottom: 18px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, #E63946, #d90429);
            border-radius: 999px;
            margin-bottom: 8px;
        }

        .progress-text {
            font-size: 14px;
            color: #666666;
            font-weight: 600;
        }

        /* Іконка з анімацією */
        .icon-shake {
            font-size: 50px;
            display: inline-block;
            animation: shake 0.5s infinite;
            margin-bottom: 15px;
        }

        /* Заголовок та текст */
        h1 {
            color: #1A1A1A;
            margin: 10px 0;
        }

        .main-message {
            color: #E63946;
            font-weight: 600;
            animation: pulse 1.5s infinite;
        }

        .sub-text {
            color: #666666;
            font-size: 14px;
        }

        /* Кнопки */
        .actions {
            display: grid;
            gap: 10px;
            margin-top: 25px;
        }

        .btn-back {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #E63946, #d90429);
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-back:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(230, 57, 70, 0.4);
        }

        .btn-exit {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-exit:hover {
            background: #eee;
        }

        /* Анімації */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Мобільна адаптація */
        @media (max-width: 480px) {
            .warning-modal { width: 90%; }
        }
    </style>
</head>
<body>

    <!-- Overlay ефект для блокування фону -->
    <div class="overlay">
        <div class="warning-modal">
            <!-- Прогрес бар -->
            <div class="progress-container">
                <div class="progress-bar"></div>
                <span class="progress-text">Спроба 1 з 3</span>
            </div>

            <!-- Іконка з анімацією -->
            <div class="icon-shake">⚠️</div>

            <!-- Текстовий контент -->
            <h1>Порушення правил</h1>
            <p class="main-message">Ви перемкнули вкладку браузера. Це суворо заборонено.</p>
            <p class="sub-text">Продовжуючи навчання, ви погоджуєтесь з правилами тестування.</p>

            <!-- Кнопки -->
            <div class="actions">
                <button class="btn-back">Повернутися до тесту</button>
                <button class="btn-exit">Завершити спробу</button>
            </div>
        </div>
    </div>

</body>
</html>
